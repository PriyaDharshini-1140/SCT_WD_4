<!-- ==========================================
     HTML : index.html
     Professional To-Do Web App
========================================== -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TaskFlow - Professional To-Do Manager</title>

    <link rel="stylesheet"
          href="style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- =========================
         TOAST NOTIFICATION
    ========================== -->

    <div id="toast"></div>

    <!-- =========================
         MAIN CONTAINER
    ========================== -->

    <div class="container">

        <!-- =========================
             HEADER
        ========================== -->

        <header class="header">

            <div>

                <h1>
                    <i class="fa-solid fa-list-check"></i>
                    TaskFlow
                </h1>

                <p>
                    Organize your day. Stay productive.
                </p>

            </div>

            <button id="themeBtn">
                🌙 Dark Mode
            </button>

        </header>

        <!-- =========================
             DASHBOARD
        ========================== -->

        <section class="dashboard">

            <div class="stat-card">

                <i class="fa-solid fa-list"></i>

                <h2 id="totalTasks">
                    0
                </h2>

                <span>Total Tasks</span>

            </div>

            <div class="stat-card">

                <i class="fa-solid fa-circle-check"></i>

                <h2 id="completedTasks">
                    0
                </h2>

                <span>Completed</span>

            </div>

            <div class="stat-card">

                <i class="fa-solid fa-clock"></i>

                <h2 id="pendingTasks">
                    0
                </h2>

                <span>Pending</span>

            </div>

        </section>

        <!-- =========================
             PROGRESS BAR
        ========================== -->

        <section class="progress-section">

            <div class="progress-header">

                <span>
                    Task Completion Progress
                </span>

                <span id="progressText">
                    0%
                </span>

            </div>

            <div class="progress-container">

                <div id="progressBar"></div>

            </div>

        </section>

        <!-- =========================
             SEARCH
        ========================== -->

        <section class="search-section">

            <input
                type="text"
                id="searchTask"
                placeholder="🔍 Search tasks...">

        </section>

        <!-- =========================
             TASK INPUT AREA
        ========================== -->

        <section class="task-input">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter Task">

            <input
                type="datetime-local"
                id="taskDate">

            <select id="taskCategory">

                <option value="Work">
                    💼 Work
                </option>

                <option value="Study">
                    📚 Study
                </option>

                <option value="Personal">
                    🏠 Personal
                </option>

                <option value="Shopping">
                    🛒 Shopping
                </option>

                <option value="Health">
                    ❤️ Health
                </option>

            </select>

            <select id="taskPriority">

                <option value="High">
                    🔴 High
                </option>

                <option value="Medium">
                    🟡 Medium
                </option>

                <option value="Low">
                    🟢 Low
                </option>

            </select>

            <button id="addTaskBtn">

                <i class="fa-solid fa-plus"></i>

                Add Task

            </button>

        </section>

        <!-- =========================
             FILTERS
        ========================== -->

        <section class="filters">

            <button
                class="filter-btn active-filter"
                data-filter="all">

                All

            </button>

            <button
                class="filter-btn"
                data-filter="active">

                Active

            </button>

            <button
                class="filter-btn"
                data-filter="completed">

                Completed

            </button>

        </section>

        <!-- =========================
             ACTION BUTTONS
        ========================== -->

        <section class="action-bar">

            <button id="exportBtn">

                <i class="fa-solid fa-file-csv"></i>

                Export CSV

            </button>

            <button id="sortBtn">

                <i class="fa-solid fa-arrow-down-wide-short"></i>

                Sort by Date

            </button>

        </section>

        <!-- =========================
             TASK LIST
        ========================== -->

        <ul id="taskList">

        </ul>

    </div>

    <!-- =========================
         EDIT TASK MODAL
    ========================== -->

    <div
        class="modal"
        id="editModal">

        <div class="modal-content">

            <div class="modal-header">

                <h2>
                    Edit Task
                </h2>

                <button
                    class="close-btn"
                    id="closeModal">

                    ×

                </button>

            </div>

            <input
                type="text"
                id="editTaskText"
                placeholder="Task Name">

            <input
                type="datetime-local"
                id="editTaskDate">

            <select id="editTaskCategory">

                <option value="Work">
                    💼 Work
                </option>

                <option value="Study">
                    📚 Study
                </option>

                <option value="Personal">
                    🏠 Personal
                </option>

                <option value="Shopping">
                    🛒 Shopping
                </option>

                <option value="Health">
                    ❤️ Health
                </option>

            </select>

            <select id="editTaskPriority">

                <option value="High">
                    🔴 High
                </option>

                <option value="Medium">
                    🟡 Medium
                </option>

                <option value="Low">
                    🟢 Low
                </option>

            </select>

            <button id="saveEditBtn">

                Save Changes

            </button>

        </div>

    </div>

    <!-- =========================
         EMPTY STATE TEMPLATE
    ========================== -->

    <template id="emptyTemplate">

        <div class="empty-state">

            <i class="fa-solid fa-clipboard-list"></i>

            <h3>
                No Tasks Found
            </h3>

            <p>
                Add your first task to get started.
            </p>

        </div>

    </template>

    <!-- =========================
         JAVASCRIPT
    ========================== -->

    <script src="script.js"></script>

</body>

</html>
